name: CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                module: [server, client]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'
                  cache-dependency-path: ${{ matrix.module }}/package-lock.json
            - run: cd ${{ matrix.module }} && npm ci
            - run: cd ${{ matrix.module }} && npm run test:cov
